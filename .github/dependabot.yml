version: 2
updates:
  # Backend / ML Python dependencies.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]

  # GitHub Actions workflow versions.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Next.js frontend dependencies.
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
