[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["scripts/archive", "frontend", "notebooks", ".venv", "presentation"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
# E501 (line length) is advisory here; many report/docstring lines are long.
# E702 (compact `a; b`) is an intentional style in the Flask app logging setup.
ignore = ["E501", "E702"]

[tool.ruff.lint.per-file-ignores]
# Package __init__ files intentionally re-export names.
"**/__init__.py" = ["F401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
